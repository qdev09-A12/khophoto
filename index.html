<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Lưu Trữ ẢNh Static</title>
    <style>
        /* Giao diện Dark Theme & Neon hiện đại, chống mỏi mắt */
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 30px;
        }
        
        h1 {
            text-align: center;
            color: #58a6ff;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
            margin-bottom: 40px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .image-card:hover {
            border-color: #58a6ff;
            box-shadow: 0 0 15px rgba(88, 166, 255, 0.2);
            transform: translateY(-4px);
        }

        .image-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #30363d;
            background: #000;
        }

        .image-name {
            padding: 12px;
            font-size: 13px;
            text-align: center;
            color: #8b949e;
            word-break: break-all;
        }

        .copy-btn {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(88, 166, 255, 0.9);
            color: #0d1117;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s ease;
        }

        .image-card:hover .copy-btn {
            opacity: 1;
            bottom: 60px;
        }

        .copy-btn:hover {
            background: #79c0ff;
            box-shadow: 0 0 10px rgba(121, 192, 255, 0.5);
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #238636;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 14px;
            position: fixed;
            z-index: 1;
            right: 30px;
            bottom: 30px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(35, 134, 54, 0.4);
            opacity: 0;
            transition: opacity 0.4s, bottom 0.4s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <h1>KHO LƯU TRỮ ẢNH CÁ NHÂN</h1>

    <div class="gallery" id="gallery">
        </div>

    <div id="toast">Đã copy link ảnh!</div>

    <script>
        // =========================================================
        // 1. THÊM TÊN ẢNH VÀO ĐÂY MỖI KHI BẠN UPLOAD FILE MỚI
        // =========================================================
        const imageList = [
            "anh_mau_1.png",
            "anh_mau_2.jpg",
            "icon_logo.svg"
            // Cách thêm: "tên_file.đuôi", (nhớ có dấu phẩy ở cuối)
        ];

        // =========================================================
        // Phần code tự động xử lý (Bạn không cần sửa phần dưới này)
        // =========================================================
        const gallery = document.getElementById('gallery');

        if (imageList.length === 0) {
            gallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #8b949e;">Chưa có ảnh nào trong danh sách.</div>';
        } else {
            imageList.forEach(img => {
                // Tự động tạo link tuyệt đối dựa trên URL hiện tại của trang web
                const absoluteUrl = new URL(img, window.location.href).href;

                // Render giao diện thẻ ảnh
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${img}" alt="${img}" loading="lazy">
                    <div class="image-name">${img}</div>
                    <button class="copy-btn" onclick="copyLink('${absoluteUrl}')">Copy Link</button>
                `;
                gallery.appendChild(card);
            });
        }

        // Hàm xử lý nút Copy Link
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(function() {
                var toast = document.getElementById("toast");
                toast.className = "show";
                setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 2500);
            }, function(err) {
                alert('Không thể copy tự động. Link của bạn là: ' + url);
            });
        }
    </script>
</body>
</html>
